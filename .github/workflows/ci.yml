name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  tests:
    name: tests / Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install tox
        run: python -m pip install --upgrade pip tox

      - name: Run tests env
        run: tox -e tests

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install tox
        run: python -m pip install --upgrade pip tox
      - name: Run lint env
        run: tox -e lint

  ising-validation:
    name: REWL Ising L=8 validation
    runs-on: ubuntu-latest
    needs: tests
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run REWL Ising L=8 validation (ln_f_final=1e-8)
        run: python examples/ising_rewl_validation.py --seed 0

      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ising-validation-trace
          path: |
            examples/cache/
            *.tsv
          if-no-files-found: ignore
