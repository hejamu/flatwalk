name: Documentation

on:
  push:
    branches: [master]
    tags: ["*"]
  pull_request:

# Allow only one concurrent deployment, skipping runs queued between an in-progress
# run and the latest queued run. Do not cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install tox
        run: python -m pip install --upgrade pip tox

      - name: Build documentation
        run: tox -e docs

      - name: Stage site (preserve other doc kind from gh-pages)
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          # Pull the existing gh-pages tree so we keep the other kind
          # (latest/ when deploying stable/, and vice versa).
          git clone --depth 1 --branch gh-pages \
            "https://github.com/${GITHUB_REPOSITORY}" site 2>/dev/null || mkdir site
          rm -rf site/.git

          REF_KIND=$(echo "$GITHUB_REF" | cut -d / -f2)
          if [[ "$REF_KIND" == "tags" ]]; then
            DOC_KIND="stable"
          else
            DOC_KIND="latest"
          fi

          rm -rf "site/${DOC_KIND}"
          mv docs/build/html "site/${DOC_KIND}"

          # Root redirect so the bare Pages URL lands on latest/.
          cat > site/index.html <<'HTML'
          <!doctype html>
          <meta http-equiv="refresh" content="0; url=latest/">
          <title>flatwalk</title>
          <p>Redirecting to <a href="latest/">latest/</a>.</p>
          HTML

      - name: Upload Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
