  <g fill="#475569">
    <rect x="8" y="29" width="4.5" height="8" rx="1"/>
    <rect x="15" y="20" width="4.5" height="17" rx="1"/>
    <rect x="22" y="13" width="4.5" height="24" rx="1"/>
    <rect x="29" y="20" width="4.5" height="17" rx="1"/>
    <rect x="36" y="29" width="4.5" height="8" rx="1"/>
  </g>
  <circle cx="43" cy="37" r="3" fill="#14B8A6"/>
</svg>
