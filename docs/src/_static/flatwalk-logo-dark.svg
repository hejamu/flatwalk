<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 196 60" role="img" aria-label="flatwalk">
  <title>flatwalk</title>
  <!-- density of states as a bell-shaped histogram, settling onto a flat
       (leveled) line; the wordmark rides the flat part, walker dot trails -->
  <path d="M8 46 L184 46" fill="none" stroke="#2DD4BF" stroke-width="3.2" stroke-linecap="round"/>
  <g fill="#CBD5E1">
    <rect x="10" y="39" width="4" height="7" rx="1"/>
    <rect x="16" y="31" width="4" height="15" rx="1"/>
    <rect x="22" y="20" width="4" height="26" rx="1"/>
    <rect x="28" y="14" width="4" height="32" rx="1"/>
    <rect x="34" y="20" width="4" height="26" rx="1"/>
    <rect x="40" y="31" width="4" height="15" rx="1"/>
    <rect x="46" y="39" width="4" height="7" rx="1"/>
  </g>
  <circle cx="184" cy="46" r="3.2" fill="#2DD4BF"/>
  <text x="58" y="42" font-family="Inter, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="26" font-weight="600" letter-spacing="-0.5" fill="#CBD5E1">flatwalk</text>
</svg>
